<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@pekerjasaleskreatif - Dashboard Produk</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Pengaturan Dasar & Tema Gelap Modern */
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #121212; /* Warna latar gelap elegan */
            color: #ffffff;
            margin: 0;
            padding: 0;
            padding-bottom: 50px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Bagian Profil Header */
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
            padding-top: 20px;
        }
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #ff6600; /* Aksen warna Shopee/Oranye */
            object-fit: cover;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.4);
        }
        .username {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 10px 0 5px 0;
        }
        .bio {
            font-size: 0.9rem;
            color: #aaaaaa;
            margin-bottom: 20px;
        }

        /* Tombol Media Sosial */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #1e1e1e;
            color: #ffffff;
            font-size: 1.2rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .social-btn:hover {
            transform: translateY(-3px);
            background-color: #ff6600;
            color: white;
        }
        .wa-btn { color: #25D366; }
        .ig-btn { color: #E1306C; }
        .fb-btn { color: #1877F2; }
        .tt-btn { color: #ffffff; }

        /* Kategori Produk */
        .category-section {
            margin-bottom: 35px;
        }
        .category-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 4px solid #ff6600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Grid Produk (Kotak-kotak) */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Membagi jadi 2 kolom */
            gap: 15px;
        }
        .product-card {
            background-color: #1e1e1e;
            border-radius: 12px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .product-card:hover {
            transform: scale(1.03);
            border: 1px solid #ff6600;
        }
        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1; /* Membuat gambar persegi presisi */
            object-fit: cover;
        }
        .product-info {
            padding: 10px;
            text-align: center;
        }
        .product-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-beli {
            display: inline-block;
            background-color: #ff6600;
            color: white;
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="category-section">

    </div>

</div>

</body>
</html>
